<div class="min-h-screen bg-slate-50 flex font-sans">

  <!-- Columna Izquierda Decorativa -->
  <div class="hidden md:flex w-1/2 p-4">
    <div
      class="w-full h-full bg-gradient-to-br from-violet-600 to-cyan-400 rounded-3xl shadow-2xl overflow-hidden relative flex flex-col items-center justify-center p-12 text-center group">

      <!-- Cristal translúcido -->
      <div class="absolute inset-0 bg-white/5 backdrop-blur-[2px]"></div>

      <!-- Contenedor 3D Flotante con otra Ilustración -->
      <div
        class="relative z-10 w-full max-w-sm aspect-square bg-white/10 rounded-[3rem] border border-white/20 flex flex-col items-center justify-center shadow-[0_0_50px_rgba(255,255,255,0.15)] mb-10 transition-all duration-700 group-hover:scale-105 group-hover:bg-white/15">
        <!-- Imagen del registro -->
        <img src="https://i.postimg.cc/6qM5347B/REGISTER_2.png" alt="Ilustración Registro 3D"
          class="w-4/5 object-contain drop-shadow-2xl hover:-translate-y-2 transition-transform duration-500">

      </div>

      <h2 class="relative z-10 text-4xl xl:text-5xl font-extrabold text-white tracking-tight mb-4 drop-shadow-md">Tu red
        académica</h2>
      <p class="relative z-10 text-white/90 text-lg xl:text-xl font-medium max-w-sm leading-relaxed">Forma parte de la
        nueva revolución educativa. Únete, colabora y crece con Edubox.</p>
    </div>
  </div>

  <!-- Columna Derecha Formulario -->
  <div class="w-full md:w-1/2 flex items-center justify-center p-6 sm:p-10 lg:p-12 relative overflow-hidden">

    <!-- Burbujas radiantes móviles -->
    <div class="absolute top-0 right-[-10%] w-72 h-72 rounded-full bg-violet-400/20 blur-3xl md:hidden opacity-70">
    </div>
    <div class="absolute bottom-[-10%] left-[-10%] w-72 h-72 rounded-full bg-cyan-400/20 blur-3xl md:hidden opacity-70">
    </div>

    <!-- TARJETA DEL FORMULARIO -->
    <div
      class="bg-white rounded-[2.5rem] shadow-2xl shadow-violet-200/50 p-8 sm:p-10 lg:p-12 max-w-xl w-full relative z-10 border border-white/50 animate-fade-in-up">

      <div class="flex justify-center mb-10">
        <img src="https://i.postimg.cc/wTS1dVNh/eduvox-logo.png" alt="Eduvox Logo"
          class="h-10 drop-shadow-sm transition-transform hover:scale-105">
      </div>

      <div class="text-center mb-10">
        <h2 class="text-3xl font-extrabold text-slate-800 mb-2 tracking-tight">Crear una Cuenta</h2>
        <p class="text-slate-500 font-medium tracking-wide">Comienza tu experiencia hoy mismo.</p>
      </div>

      <form class="space-y-5" (ngSubmit)="registrar()">

        <!-- INPUT NOMBRE -->
        <div class="relative group">
          <div
            class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-violet-500 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
          </div>
          <input type="text" id="nombre" [(ngModel)]="nuevoUsuario.nombre" name="nombre" placeholder="Nombre completo"
            required autocomplete="name"
            class="w-full pl-12 pr-5 py-4 bg-slate-100 text-slate-700 rounded-2xl border-none focus:ring-2 focus:ring-violet-500 focus:bg-white transition-all outline-none placeholder-slate-400 font-semibold shadow-inner focus:shadow-none">
        </div>

        <!-- INPUT CORREO -->
        <div class="relative group">
          <div
            class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-violet-500 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
              </path>
            </svg>
          </div>
          <input type="email" id="correo" [(ngModel)]="nuevoUsuario.correo" name="correo"
            placeholder="Correo electrónico" required autocomplete="email"
            class="w-full pl-12 pr-5 py-4 bg-slate-100 text-slate-700 rounded-2xl border-none focus:ring-2 focus:ring-violet-500 focus:bg-white transition-all outline-none placeholder-slate-400 font-semibold shadow-inner focus:shadow-none">
        </div>

        <!-- PASSWORD Y ROL (en Grid Responsivo) -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">

          <!-- Password input -->
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-violet-500 transition-colors">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
              </svg>
            </div>
            <input [type]="showPassword ? 'text' : 'password'" id="password" [(ngModel)]="nuevoUsuario.password"
              name="password" placeholder="Contraseña" required autocomplete="new-password"
              class="w-full pl-11 pr-10 py-4 bg-slate-100 text-slate-700 rounded-2xl border-none focus:ring-2 focus:ring-violet-500 focus:bg-white transition-all outline-none placeholder-slate-400 font-semibold shadow-inner focus:shadow-none tracking-wide">
            <button type="button"
              class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-violet-600 transition-colors focus:outline-none"
              (click)="togglePasswordVisibility()">
              <!-- Ojo abierto: ver contraseña -->
              <svg *ngIf="!showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <!-- Ojo tachado: ocultar contraseña -->
              <svg *ngIf="showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.73 10.73A2 2 0 0013.27 13.27"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M1 1l22 22"/>
              </svg>
            </button>
          </div>

          <!-- ROL Selector -->
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-violet-500 transition-colors z-10">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
            </div>
            <select id="rol" [(ngModel)]="nuevoUsuario.rol" name="rol" required
              class="w-full pl-11 pr-10 py-4 bg-slate-100 text-slate-700 rounded-2xl border-none focus:ring-2 focus:ring-violet-500 focus:bg-white transition-all outline-none font-semibold shadow-inner focus:shadow-none appearance-none cursor-pointer">
              <option value="Estudiante">Estudiante</option>
              <option value="Profesor">Profesor</option>
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-4 text-slate-500 font-bold z-10">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"/>
              </svg>
            </div>
          </div>
        </div>

        <!-- ══ INDICADOR DE FORTALEZA — ancho completo, fuera del grid ══ -->
        <div *ngIf="nuevoUsuario.password"
             class="rounded-2xl border p-4 transition-all duration-500"
             [ngClass]="{
               'bg-red-50 border-red-200':       passwordStrength.level === 1,
               'bg-amber-50 border-amber-200':   passwordStrength.level === 2,
               'bg-emerald-50 border-emerald-200': passwordStrength.level === 3
             }">

          <!-- Barra de progreso gruesa -->
          <div class="flex gap-1.5 mb-3">
            <div class="h-2 flex-1 rounded-full transition-all duration-500"
                 [ngClass]="passwordStrength.segments[0] ? passwordStrength.barColor : 'bg-slate-200'"></div>
            <div class="h-2 flex-1 rounded-full transition-all duration-500"
                 [ngClass]="passwordStrength.segments[1] ? passwordStrength.barColor : 'bg-slate-200'"></div>
            <div class="h-2 flex-1 rounded-full transition-all duration-500"
                 [ngClass]="passwordStrength.segments[2] ? passwordStrength.barColor : 'bg-slate-200'"></div>
          </div>

          <!-- Fila inferior: badge nivel izq + criterios 2×2 der -->
          <div class="flex items-start gap-4">

            <!-- Badge de nivel con icono -->
            <div class="flex items-center gap-2 flex-shrink-0">
              <div class="w-8 h-8 rounded-xl flex items-center justify-center transition-all duration-300"
                   [ngClass]="{
                     'bg-red-100 text-red-500':       passwordStrength.level === 1,
                     'bg-amber-100 text-amber-500':   passwordStrength.level === 2,
                     'bg-emerald-100 text-emerald-600': passwordStrength.level === 3
                   }">
                <!-- Débil: escudo X -->
                <svg *ngIf="passwordStrength.level === 1" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.618 5.984A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 9.75l4.5 4.5m0-4.5l-4.5 4.5"/>
                </svg>
                <!-- Media: escudo guión -->
                <svg *ngIf="passwordStrength.level === 2" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.618 5.984A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8.5 12h7"/>
                </svg>
                <!-- Fuerte: escudo check -->
                <svg *ngIf="passwordStrength.level === 3" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                </svg>
              </div>
              <div>
                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest leading-none mb-0.5">Seguridad</p>
                <p class="text-sm font-black leading-none transition-all duration-300"
                   [ngClass]="{
                     'text-red-500':       passwordStrength.level === 1,
                     'text-amber-500':     passwordStrength.level === 2,
                     'text-emerald-600':   passwordStrength.level === 3
                   }">
                  <span *ngIf="passwordStrength.level === 1">Débil</span>
                  <span *ngIf="passwordStrength.level === 2">Media</span>
                  <span *ngIf="passwordStrength.level === 3">Fuerte</span>
                </p>
              </div>
            </div>

            <!-- Divisor vertical -->
            <div class="w-px self-stretch bg-slate-200 flex-shrink-0"></div>

            <!-- Criterios en grid 2×2 -->
            <div class="grid grid-cols-2 gap-x-4 gap-y-1.5 flex-1">

              <div class="flex items-center gap-1.5 text-[11px] font-semibold transition-colors duration-300"
                   [ngClass]="nuevoUsuario.password.length >= 8 ? 'text-emerald-600' : 'text-slate-400'">
                <div class="w-4 h-4 rounded-full flex-shrink-0 flex items-center justify-center transition-all duration-300"
                     [ngClass]="nuevoUsuario.password.length >= 8 ? 'bg-emerald-100' : 'bg-slate-100'">
                  <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path *ngIf="nuevoUsuario.password.length >= 8" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
                    <path *ngIf="nuevoUsuario.password.length < 8"  stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"/>
                  </svg>
                </div>
                8+ caracteres
              </div>

              <div class="flex items-center gap-1.5 text-[11px] font-semibold transition-colors duration-300"
                   [ngClass]="/[A-Z]/.test(nuevoUsuario.password) ? 'text-emerald-600' : 'text-slate-400'">
                <div class="w-4 h-4 rounded-full flex-shrink-0 flex items-center justify-center transition-all duration-300"
                     [ngClass]="/[A-Z]/.test(nuevoUsuario.password) ? 'bg-emerald-100' : 'bg-slate-100'">
                  <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path *ngIf="/[A-Z]/.test(nuevoUsuario.password)"  stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
                    <path *ngIf="!/[A-Z]/.test(nuevoUsuario.password)" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"/>
                  </svg>
                </div>
                Mayúscula
              </div>

              <div class="flex items-center gap-1.5 text-[11px] font-semibold transition-colors duration-300"
                   [ngClass]="/[0-9]/.test(nuevoUsuario.password) ? 'text-emerald-600' : 'text-slate-400'">
                <div class="w-4 h-4 rounded-full flex-shrink-0 flex items-center justify-center transition-all duration-300"
                     [ngClass]="/[0-9]/.test(nuevoUsuario.password) ? 'bg-emerald-100' : 'bg-slate-100'">
                  <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path *ngIf="/[0-9]/.test(nuevoUsuario.password)"  stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
                    <path *ngIf="!/[0-9]/.test(nuevoUsuario.password)" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"/>
                  </svg>
                </div>
                Número
              </div>

              <div class="flex items-center gap-1.5 text-[11px] font-semibold transition-colors duration-300"
                   [ngClass]="/[^A-Za-z0-9]/.test(nuevoUsuario.password) ? 'text-emerald-600' : 'text-slate-400'">
                <div class="w-4 h-4 rounded-full flex-shrink-0 flex items-center justify-center transition-all duration-300"
                     [ngClass]="/[^A-Za-z0-9]/.test(nuevoUsuario.password) ? 'bg-emerald-100' : 'bg-slate-100'">
                  <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path *ngIf="/[^A-Za-z0-9]/.test(nuevoUsuario.password)"  stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
                    <path *ngIf="!/[^A-Za-z0-9]/.test(nuevoUsuario.password)" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"/>
                  </svg>
                </div>
                Símbolo (!@#$)
              </div>

            </div>
          </div>
        </div>

        <!-- SELECTOR DE SEXO — SOLO PARA ESTUDIANTES -->
        <div *ngIf="nuevoUsuario.rol === 'Estudiante'" class="relative group animate-fade-in-up">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-violet-500 transition-colors z-10">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z">
              </path>
            </svg>
          </div>
          <select id="sexo" [(ngModel)]="nuevoUsuario.sexo" name="sexo" required
            class="w-full pl-11 pr-10 py-4 bg-slate-100 text-slate-700 rounded-2xl border-none focus:ring-2 focus:ring-violet-500 focus:bg-white transition-all outline-none font-semibold shadow-inner focus:shadow-none appearance-none cursor-pointer"
            [class.text-slate-400]="nuevoUsuario.sexo === ''">
            <option value="" disabled selected hidden>Sexo biológico</option>
            <option value="Masculino" class="text-slate-700">Masculino</option>
            <option value="Femenino" class="text-slate-700">Femenino</option>
            <option value="Otro" class="text-slate-700">Otro</option>
            <option value="Prefiero no decir" class="text-slate-700">Prefiero no decir</option>
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-4 text-slate-500 font-bold z-10">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path>
            </svg>
          </div>
        </div>

        <!-- CAMPOS EXTRA PARA PROFESORES -->
        <div *ngIf="nuevoUsuario.rol === 'Profesor'" class="grid grid-cols-1 sm:grid-cols-2 gap-5 animate-fade-in-up">
          <!-- INPUT TELÉFONO -->
          <div class="relative group">
            <div
              class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-violet-500 transition-colors">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z">
                </path>
              </svg>
            </div>
            <input type="tel" id="telefono" [(ngModel)]="nuevoUsuario.telefono" name="telefono"
              placeholder="Número de contacto" required
              class="w-full pl-12 pr-5 py-4 bg-slate-100 text-slate-700 rounded-2xl border-none focus:ring-2 focus:ring-violet-500 focus:bg-white transition-all outline-none placeholder-slate-400 font-semibold shadow-inner focus:shadow-none">
          </div>

          <!-- SELECT TÍTULO PROFESIONAL -->
          <div class="relative group">
            <div
              class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-violet-500 transition-colors z-10">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 14l9-5-9-5-9 5 9 5zm0 0v5"></path>
              </svg>
            </div>
            <select id="tituloProfesional" [(ngModel)]="nuevoUsuario.tituloProfesional" name="tituloProfesional" required
              class="w-full pl-12 pr-10 py-4 bg-slate-100 text-slate-700 rounded-2xl border-none focus:ring-2 focus:ring-violet-500 focus:bg-white transition-all outline-none font-semibold shadow-inner focus:shadow-none appearance-none cursor-pointer"
              [class.text-slate-400]="nuevoUsuario.tituloProfesional === ''">
              <option value="" disabled selected hidden>Título profesional</option>
              <option value="Licenciatura" class="text-slate-700">Licenciatura</option>
              <option value="Ingeniería" class="text-slate-700">Ingeniería</option>
              <option value="Maestría / Magíster" class="text-slate-700">Maestría / Magíster</option>
              <option value="Doctorado" class="text-slate-700">Doctorado</option>
              <option value="Técnico Superior" class="text-slate-700">Técnico Superior</option>
              <option value="Especialización" class="text-slate-700">Especialización</option>
              <option value="Otro" class="text-slate-700">Otro</option>
            </select>
            <div
              class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-4 text-slate-500 font-bold z-10">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path>
              </svg>
            </div>
          </div>
        </div>

        <button type="submit"
          class="w-full py-4 mt-6 bg-violet-600 text-white font-bold text-lg rounded-2xl hover:bg-violet-700 hover:-translate-y-1 hover:shadow-xl hover:shadow-violet-500/40 active:scale-95 transition-all duration-300 outline-none focus:ring-4 focus:ring-violet-500/50 flex justify-center items-center gap-3">
          Regístrame ahora
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
          </svg>
        </button>
      </form>

      <div class="mt-10 text-center">
        <p class="text-slate-500 font-medium text-[15px]">
          ¿Ya interactúas con nosotros?
          <a href="/login"
            class="text-violet-600 font-extrabold hover:text-violet-800 hover:underline transition-all ml-1 inline-block">Inicia
            Sesión</a>
        </p>
