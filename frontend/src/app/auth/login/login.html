<div class="min-h-screen bg-slate-50 flex font-sans">

  <!-- Columna Izquierda Decorativa (Visible solo en md o mayor) -->
  <div class="hidden md:flex w-1/2 p-4">
    <div
      class="w-full h-full bg-gradient-to-br from-violet-600 to-cyan-400 rounded-3xl shadow-2xl overflow-hidden relative flex flex-col items-center justify-center p-12 text-center group">

      <!-- Panel de vidrio y destellos -->
      <div class="absolute inset-0 bg-white/5 backdrop-blur-[2px]"></div>

      <!-- Contenedor 3D Flotante -->
      <div
        class="relative z-10 w-full max-w-sm aspect-square bg-white/10 rounded-[3rem] border border-white/20 flex flex-col items-center justify-center shadow-[0_0_50px_rgba(255,255,255,0.15)] mb-10 transition-all duration-700 group-hover:scale-105 group-hover:bg-white/15">
        <!-- Imagen del login -->
        <img src="https://i.postimg.cc/L5x6XgqM/LOGIN_2.png" alt="Ilustración 3D"
          class="w-4/5 object-contain drop-shadow-2xl hover:-translate-y-2 transition-transform duration-500">

      </div>

      <h2 class="relative z-10 text-4xl xl:text-5xl font-extrabold text-white tracking-tight mb-4 drop-shadow-md">
        Aprende sin límites</h2>
      <p class="relative z-10 text-white/90 text-lg xl:text-xl font-medium max-w-sm leading-relaxed">Conéctate al aula
        virtual y expande tus conocimientos en tiempo real a través de Edubox.</p>
    </div>
  </div>

  <!-- Columna Derecha Formulario -->
  <div class="w-full md:w-1/2 flex items-center justify-center p-6 sm:p-10 lg:p-12 relative overflow-hidden">

    <!-- Artefactos de fondo en móviles (blur radiante) -->
    <div class="absolute top-0 right-[-10%] w-72 h-72 rounded-full bg-violet-400/20 blur-3xl md:hidden opacity-70">
    </div>
    <div class="absolute bottom-[-10%] left-[-10%] w-72 h-72 rounded-full bg-cyan-400/20 blur-3xl md:hidden opacity-70">
    </div>

    <!-- TARJETA DEL FORMULARIO -->
    <div
      class="bg-white rounded-[2.5rem] shadow-2xl shadow-violet-200/50 p-8 sm:p-12 max-w-md w-full relative z-10 border border-white/50 animate-fade-in-up">

      <div class="flex justify-center mb-10">
        <img src="https://i.postimg.cc/wTS1dVNh/eduvox-logo.png" alt="Eduvox Logo"
          class="h-12 drop-shadow-sm transition-transform hover:scale-105">
      </div>

      <div class="text-center mb-10">
        <h2 class="text-3xl font-extrabold text-slate-800 mb-3 tracking-tight">Bienvenido de nuevo</h2>
        <p class="text-slate-500 font-medium">Ingresa tus credenciales para empezar.</p>
      </div>

      <form class="space-y-5" (ngSubmit)="onLogin()">

        <!-- INPUT CORREO -->
        <div class="relative group">
          <div
            class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-violet-500 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207">
              </path>
            </svg>
          </div>
          <input type="email" id="correo" [(ngModel)]="datos.correo" name="correo" placeholder="Correo electrónico"
            required autocomplete="email"
            class="w-full pl-12 pr-5 py-4 bg-slate-100 text-slate-700 rounded-2xl border-none focus:ring-2 focus:ring-violet-500 focus:bg-white transition-all outline-none placeholder-slate-400 font-semibold shadow-inner focus:shadow-none">
        </div>

        <!-- INPUT PASSWORD -->
        <div class="relative group mt-5">
          <div
            class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-violet-500 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
              </path>
            </svg>
          </div>
          <input [type]="showPassword ? 'text' : 'password'" id="password" [(ngModel)]="datos.password" name="password"
            placeholder="Tu Contraseña" required autocomplete="current-password"
            class="w-full pl-12 pr-12 py-4 bg-slate-100 text-slate-700 rounded-2xl border-none focus:ring-2 focus:ring-violet-500 focus:bg-white transition-all outline-none placeholder-slate-400 font-semibold shadow-inner focus:shadow-none tracking-wide text-lg">

          <!-- Botón mostrar constraseña -->
          <button type="button"
            class="absolute inset-y-0 right-0 pr-5 flex items-center text-slate-400 hover:text-violet-600 transition-colors focus:outline-none focus:text-violet-600"
            (click)="togglePasswordVisibility()">
            <svg *ngIf="!showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
              </path>
            </svg>
            <svg *ngIf="showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21">
              </path>
            </svg>
          </button>
        </div>

        <!-- Olvidaste contraseña sub-row -->
        <div class="flex justify-end pt-1 pb-4">
          <a routerLink="/forgot-password" class="text-sm font-bold text-violet-600 hover:text-violet-800 transition-colors">¿Olvidaste tu
            contraseña?</a>
        </div>

        <button type="submit"
          class="w-full py-4 mt-2 bg-violet-600 text-white font-bold text-lg rounded-2xl hover:bg-violet-700 hover:-translate-y-1 hover:shadow-xl hover:shadow-violet-500/40 active:scale-95 transition-all duration-300 outline-none focus:ring-4 focus:ring-violet-500/50 flex justify-center items-center gap-3">
          Iniciar Sesión
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
          </svg>
        </button>
      </form>

      <div class="mt-10 text-center">
        <p class="text-slate-500 font-medium text-[15px]">
          ¿No tienes una cuenta?
          <a href="/register"
            class="text-violet-600 font-extrabold hover:text-violet-800 hover:underline transition-all ml-1 w-max relative inline-block">Regístrate
            gratis</a>
        </p>
      </div>

    </div>
  </div>
</div>
