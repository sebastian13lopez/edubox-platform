<div class="h-full bg-[#F9FAFB] font-sans text-[#111827] p-8 w-full max-w-7xl mx-auto flex flex-col items-center">
  <header class="w-full mb-10 text-center md:text-left">
    <h1 class="text-3xl font-extrabold tracking-tight">Mi Perfil</h1>
    <p class="text-[#6B7280] font-medium mt-1">Configura y revisa tu información académica y personal.</p>
  </header>
  
  <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 p-8 md:p-12 w-full max-w-3xl flex flex-col items-center justify-center animate-fade-in-up">
    <!-- Avatar -->
    <div class="relative mb-6">
      <div class="w-28 h-28 rounded-full bg-blue-50 flex items-center justify-center text-4xl font-extrabold text-[#2563EB] shadow-sm border-2 border-slate-100">
        {{ nombreProfesor.charAt(0) | uppercase }}
      </div>
      <div class="absolute bottom-1 right-1 bg-green-500 w-5 h-5 rounded-full border-4 border-white shadow-sm" title="Docente Verificado"></div>
    </div>
    
    <div class="bg-blue-50 text-[#2563EB] text-xs font-extrabold px-3 py-1.5 rounded-lg uppercase tracking-widest mb-8 border border-blue-100">Profesor</div>
    
    <div class="w-full space-y-4">
      <div class="bg-slate-50 border border-slate-100 rounded-2xl p-5 flex flex-col sm:flex-row sm:items-center justify-between hover:bg-white hover:border-blue-100 hover:shadow-sm transition-all duration-300 group">
        <span class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1 sm:mb-0 flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
          Nombre Completo
        </span>
        <span class="font-bold text-[#111827] group-hover:text-[#2563EB] transition-colors">Prof. {{ nombreProfesor }}</span>
      </div>
      <div class="bg-slate-50 border border-slate-100 rounded-2xl p-5 flex flex-col sm:flex-row sm:items-center justify-between hover:bg-white hover:border-blue-100 hover:shadow-sm transition-all duration-300 group">
        <span class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1 sm:mb-0 flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
          Correo Electrónico
        </span>
        <span class="font-bold text-[#111827] group-hover:text-[#2563EB] transition-colors">{{ correoProfesor }}</span>
      </div>
      <div class="bg-slate-50 border border-slate-100 rounded-2xl p-5 flex flex-col sm:flex-row sm:items-center justify-between hover:bg-white hover:border-blue-100 hover:shadow-sm transition-all duration-300 group">
        <span class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1 sm:mb-0 flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
          Miembro desde
        </span>
        <span class="font-bold text-[#111827]">Enero 2025</span>
      </div>
    </div>

    <!-- Boton -->
    <button class="w-full mt-8 bg-slate-50 hover:bg-slate-100 text-slate-400 font-bold py-4 rounded-2xl border border-slate-200 transition-colors flex items-center justify-center gap-2 cursor-not-allowed" disabled>
      <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
      </svg>
      Editar información (Próximamente)
    </button>
  </div>
</div>
