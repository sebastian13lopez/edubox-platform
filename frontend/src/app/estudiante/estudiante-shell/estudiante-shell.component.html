<div class="flex h-screen bg-[#F9FAFB] font-sans overflow-hidden">
  
  <!-- SIDEBAR OSCURA BALANCEADA -->
  <aside class="hidden md:flex w-72 bg-[#0F172A] flex-col h-full shadow-xl z-30">
    
    <!-- Branding -->
    <div class="px-8 py-8 flex items-center gap-3">
      <!-- Logo blanco devuelta a la vida -->
      <img src="https://i.postimg.cc/Z5FyYs1L/logo-solo-blanco.png" alt="Eduvox Logo" class="h-8 drop-shadow-sm">
      <span class="text-2xl font-extrabold text-white tracking-tight">Eduvox</span>
    </div>

    <!-- Badge del Estudiante -->
    <div class="px-8 mb-4">
      <div class="flex items-center gap-4 bg-white/10 border border-white/5 p-3 rounded-2xl backdrop-blur-sm shadow-inner relative">
        <div class="w-10 h-10 rounded-xl bg-white text-[#0F172A] font-bold flex items-center justify-center shadow-sm text-lg">
          {{ nombreEstudiante.charAt(0) | uppercase }}
        </div>
        <div class="flex flex-col min-w-0 flex-1">
          <span class="text-[10px] font-black text-blue-200 uppercase tracking-widest leading-none mb-1">Perfil Académico</span>
          <span class="text-sm font-bold text-white truncate">{{ nombreEstudiante }}</span>
        </div>
        
        <!-- Campana Notificaciones Desktop -->
        <div class="relative">
          <button (click)="toggleNotificaciones()" class="p-2 bg-white/5 rounded-full hover:bg-white/10 transition-colors relative">
            <svg class="w-5 h-5 text-blue-100" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
            <span *ngIf="noLeidasCount > 0" class="absolute top-0 right-0 inline-flex items-center justify-center w-4 h-4 text-[10px] font-bold text-white bg-red-500 rounded-full transform translate-x-1/4 -translate-y-1/4 animate-bounce">
              {{ noLeidasCount }}
            </span>
          </button>

          <!-- Dropdown Notificaciones -->
          <div *ngIf="mostrarDropdownNotificaciones" class="absolute left-full ml-4 top-0 w-80 bg-white rounded-2xl shadow-2xl border border-slate-100 z-50 overflow-hidden transform transition-all">
            <div class="bg-slate-50 px-4 py-3 border-b border-slate-100 flex justify-between items-center">
              <h3 class="font-bold text-slate-800">Notificaciones</h3>
              <span class="text-xs font-semibold px-2 py-1 bg-blue-100 text-blue-700 rounded-full">{{ noLeidasCount }} nuevas</span>
            </div>
            <div class="max-h-80 overflow-y-auto">
              <div *ngIf="notificaciones.length === 0" class="p-6 text-center text-slate-500 text-sm">
                No tienes notificaciones nuevas
              </div>
              <div *ngFor="let notif of notificaciones" class="p-4 border-b border-slate-50 hover:bg-slate-50 transition-colors" [ngClass]="{'bg-blue-50/50': !notif.leida}">
                <div class="flex items-start gap-3">
                  <div class="mt-0.5 rounded-full p-2" [ngClass]="{
                    'bg-blue-100 text-blue-600': notif.tipo === 'info',
                    'bg-green-100 text-green-600': notif.tipo === 'success'
                  }">
                    <svg *ngIf="notif.tipo === 'info'" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <svg *ngIf="notif.tipo === 'success'" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                  </div>
                  <div class="flex-1 min-w-0">
                    <p class="text-sm font-bold text-slate-800 truncate">{{ notif.titulo }}</p>
                    <p class="text-xs text-slate-600 line-clamp-2 mt-0.5">{{ notif.mensaje }}</p>
                    <span class="text-[10px] text-slate-400 mt-1 block">{{ notif.fecha | date:'shortTime' }}</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Navegación -->
    <nav class="flex-1 px-4 space-y-1 overflow-y-auto">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.path"
        routerLinkActive="bg-[#1E40AF] text-white font-bold border-l-4 border-blue-400"
        [routerLinkActiveOptions]="{ exact: false }"
        class="flex items-center gap-3 px-5 py-3.5 rounded-xl text-blue-100 hover:bg-white/5 hover:text-white transition-all font-semibold border-l-4 border-transparent">
        <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path [attr.d]="item.icon" />
        </svg>
        <span>{{ item.label }}</span>
      </a>
    </nav>

    <!-- Footer Logout -->
    <div class="p-6">
      <button class="w-full flex justify-center items-center px-5 py-3.5 rounded-xl bg-white/10 text-white font-bold hover:bg-rose-500 hover:text-white transition-colors gap-3 border border-white/5 hover:border-transparent" (click)="onLogout()">
        <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        <span>Cerrar Sesión</span>
      </button>
    </div>
  </aside>

  <!-- MAIN AREA (Contendrá el Inicio del dashboard que diseñamos) -->
  <main class="flex-1 overflow-y-auto overflow-x-hidden w-full relative bg-[#F9FAFB]">
    <div class="md:hidden bg-[#0F172A] p-4 flex items-center justify-between sticky top-0 z-50 shadow-md">
      <div class="flex items-center gap-2">
        <img src="https://i.postimg.cc/Z5FyYs1L/logo-solo-blanco.png" alt="Eduvox Logo" class="h-6">
        <span class="text-lg font-extrabold text-white">Eduvox</span>
      </div>
      <button class="text-white">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
      </button>
    </div>

    <!-- Aquí carga inicio.component.html -->
    <div class="w-full">
      <router-outlet></router-outlet>
    </div>
  </main>
  
</div>
