<div class="flex h-screen bg-[#F9FAFB] font-sans overflow-hidden">
  
  <!-- SIDEBAR OSCURA BALANCEADA -->
  <aside class="hidden md:flex w-72 bg-[#0F172A] flex-col h-full shadow-xl z-30">
    
    <!-- Branding -->
    <div class="px-8 py-8 flex items-center gap-3">
      <!-- Logo blanco devuelta a la vida -->
      <img src="https://i.postimg.cc/Z5FyYs1L/logo-solo-blanco.png" alt="Eduvox Logo" class="h-8 drop-shadow-sm">
      <span class="text-2xl font-extrabold text-white tracking-tight">Eduvox</span>
    </div>

    <!-- Badge del Estudiante -->
    <div class="px-8 mb-8">
      <div class="flex items-center gap-4 bg-white/10 border border-white/5 p-3 rounded-2xl backdrop-blur-sm shadow-inner">
        <div class="w-10 h-10 rounded-xl bg-white text-[#0F172A] font-bold flex items-center justify-center shadow-sm text-lg">
          {{ nombreEstudiante.charAt(0) | uppercase }}
        </div>
        <div class="flex flex-col min-w-0">
          <span class="text-[10px] font-black text-blue-200 uppercase tracking-widest leading-none mb-1">Perfil Académico</span>
          <span class="text-sm font-bold text-white truncate">{{ nombreEstudiante }}</span>
        </div>
      </div>
    </div>

    <!-- Navegación -->
    <nav class="flex-1 px-4 space-y-1 overflow-y-auto">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.path"
        routerLinkActive="bg-[#1E40AF] text-white font-bold border-l-4 border-blue-400"
        [routerLinkActiveOptions]="{ exact: false }"
        class="flex items-center gap-3 px-5 py-3.5 rounded-xl text-blue-100 hover:bg-white/5 hover:text-white transition-all font-semibold border-l-4 border-transparent">
        <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path [attr.d]="item.icon" />
        </svg>
        <span>{{ item.label }}</span>
      </a>
    </nav>

    <!-- Footer Logout -->
    <div class="p-6">
      <button class="w-full flex justify-center items-center px-5 py-3.5 rounded-xl bg-white/10 text-white font-bold hover:bg-rose-500 hover:text-white transition-colors gap-3 border border-white/5 hover:border-transparent" (click)="onLogout()">
        <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        <span>Cerrar Sesión</span>
      </button>
    </div>
  </aside>

  <!-- MAIN AREA (Contendrá el Inicio del dashboard que diseñamos) -->
  <main class="flex-1 overflow-y-auto w-full relative bg-[#F9FAFB]">
    <div class="md:hidden bg-[#0F172A] p-4 flex items-center justify-between sticky top-0 z-50 shadow-md">
      <div class="flex items-center gap-2">
        <img src="https://i.postimg.cc/Z5FyYs1L/logo-solo-blanco.png" alt="Eduvox Logo" class="h-6">
        <span class="text-lg font-extrabold text-white">Eduvox</span>
      </div>
      <button class="text-white">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
      </button>
    </div>

    <!-- Aquí carga inicio.component.html -->
    <div class="w-full">
      <router-outlet></router-outlet>
    </div>
  </main>
  
</div>
